# Database policy parameters
# Override shared/policy/hcl/config.yaml for database-specific rules

rds:
  min_backup_retention_days: 7
  require_multi_az_in_prod: true
  require_encryption: true
  allow_public_access: false
  allowed_instance_classes:
    - db.t3.medium
    - db.t3.large
    - db.r5.large
    - db.r5.xlarge
    - db.r6g.large
    - db.r6g.xlarge

production_patterns:
  - "prd"
  - "prod"
  - "production"
